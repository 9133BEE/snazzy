<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>受眾分析報告集｜META 廣告受眾工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f1;--s:#ffffff;--s2:#f0efec;--s3:#ebe9e5;
  --bd:#e4e1dd;--bd2:#ccc8c3;
  --tx:#2e2c29;--sub:#7d7870;--sub2:#a8a199;
  --a:#607d96;--al:#eaf0f6;--ab:#a8bed0;--a-dark:#4d6a82;
  --good:#3d6b4f;--goodl:#d8ead2;--goodb:#96c4a8;
  --warn:#c26000;--warnl:#fff0e0;--warnb:#f0b060;
  --radius:10px;--radius-pill:20px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 2px 6px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.05);
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei','Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}

/* ── Header ── */
header{background:#0f1923;padding:0 28px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hlogo{width:30px;height:30px;background:linear-gradient(135deg,#607d96,#3d5a70);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0}
.htitle{font-size:14px;font-weight:700;color:#f1f5f9;letter-spacing:-.1px}
.hsubt{font-size:11px;color:#64748b;margin-left:4px}
.hnav{margin-left:auto;display:flex;gap:4px}
.hnav a{font-size:12px;color:#94a3b8;text-decoration:none;padding:5px 12px;border-radius:6px;transition:all .15s}
.hnav a:hover{background:rgba(255,255,255,.1);color:#f1f5f9}
.hnav a.on{background:rgba(96,125,150,.25);color:#a8bed0}

/* ── Toolbar ── */
.toolbar{background:var(--s);border-bottom:1px solid var(--bd);padding:12px 28px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow-xs)}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
.search-wrap input{width:100%;padding:8px 14px 8px 34px;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--radius-pill);font-size:13px;color:var(--tx);outline:none;transition:all .15s;font-family:inherit;font-weight:500}
.search-wrap input:focus{border-color:var(--a);background:#fff;box-shadow:0 0 0 3px rgba(96,125,150,.12)}
.search-wrap input::placeholder{color:var(--sub2)}
.search-wrap::before{content:"⌕";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--sub2);pointer-events:none}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-group label{font-size:11px;color:var(--sub);font-weight:600;margin-right:4px}
.filter-btn{padding:6px 13px;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--radius-pill);font-size:12px;color:var(--sub);cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500}
.filter-btn:hover{border-color:var(--ab);color:var(--tx)}
.filter-btn.on{background:var(--al);border-color:var(--ab);color:var(--a);font-weight:700}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.count-badge{font-size:11px;color:var(--sub);background:var(--s2);border:1px solid var(--bd);padding:4px 12px;border-radius:var(--radius-pill);font-weight:600;white-space:nowrap}
.sort-select{padding:6px 10px;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--radius-pill);font-size:12px;color:var(--tx);cursor:pointer;outline:none;font-family:inherit;font-weight:500;transition:all .15s}
.sort-select:focus{border-color:var(--a)}

/* ── Main content ── */
main{padding:24px 28px;max-width:1200px;margin:0 auto}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--s);border:1px solid var(--bd);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-xs)}
.stat-card .sn{font-size:24px;font-weight:800;color:var(--a);line-height:1;letter-spacing:-.5px}
.stat-card .sl{font-size:11px;color:var(--sub);margin-top:4px;font-weight:600;letter-spacing:.2px}

/* ── Project grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.project-card{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:18px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-xs);display:flex;flex-direction:column;gap:0;text-decoration:none;color:inherit;position:relative;overflow:hidden}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--a),var(--a-dark));opacity:0;transition:opacity .18s}
.project-card:hover{border-color:var(--ab);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.project-card:hover::before{opacity:1}
.project-card.hidden{display:none}

/* Card header */
.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.card-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--a),var(--a-dark));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;box-shadow:0 2px 6px rgba(96,125,150,.3)}
.card-meta{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-loc{font-size:11px;color:var(--sub);margin-top:2px}
.card-status{flex-shrink:0}
.status-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--radius-pill);border:1px solid}
.status-active{background:var(--goodl);color:var(--good);border-color:var(--goodb)}
.status-done{background:var(--s2);color:var(--sub);border-color:var(--bd2)}

/* Card stats */
.card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;background:var(--s2);border-radius:8px;padding:10px}
.card-stat{}
.card-stat .csn{font-size:18px;font-weight:800;color:var(--tx);line-height:1;letter-spacing:-.3px}
.card-stat .csl{font-size:10px;color:var(--sub2);margin-top:2px;font-weight:600}

/* Card tags */
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.card-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--al);color:var(--a);border:1px solid var(--ab)}
.card-tag.region{background:var(--warnl);color:var(--warn);border-color:var(--warnb)}

/* Card footer */
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;border-top:1px solid var(--bd)}
.card-date{font-size:10px;color:var(--sub2);font-weight:500}
.card-arrow{font-size:13px;color:var(--ab);font-weight:700}
.project-card:hover .card-arrow{color:var(--a)}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:700;margin-bottom:6px}
.empty-sub{font-size:13px}

/* ── Section divider ── */
.section-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.4px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--bd)}
</style>
</head>
<body>

<header>
  <div class="hlogo">M</div>
  <span class="htitle">META 受眾分析報告集</span>
  <span class="hsubt">· 9133BEE</span>
  <nav class="hnav">
    <a href="hub.html" class="on">📁 案件總覽</a>
    <a href="index.html">🏷 興趣標籤庫</a>
    <a href="snazzy.html">🔍 標籤工具</a>
  </nav>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="搜尋案名、地區…" oninput="applyFilters()">
  </div>
  <div class="filters" id="regionFilters">
    <span style="font-size:11px;color:var(--sub);font-weight:600;align-self:center">地區</span>
    <button class="filter-btn on" data-region="all" onclick="toggleFilter(this,'region')">全部</button>
    <button class="filter-btn" data-region="台中" onclick="toggleFilter(this,'region')">台中</button>
    <button class="filter-btn" data-region="桃園" onclick="toggleFilter(this,'region')">桃園</button>
    <button class="filter-btn" data-region="彰化" onclick="toggleFilter(this,'region')">彰化</button>
  </div>
  <div class="filters" id="statusFilters">
    <span style="font-size:11px;color:var(--sub);font-weight:600;align-self:center">狀態</span>
    <button class="filter-btn on" data-status="all" onclick="toggleFilter(this,'status')">全部</button>
    <button class="filter-btn" data-status="active" onclick="toggleFilter(this,'status')">進行中</button>
    <button class="filter-btn" data-status="done" onclick="toggleFilter(this,'status')">已結束</button>
  </div>
  <div class="toolbar-right">
    <select class="sort-select" id="sortSelect" onchange="applyFilters()">
      <option value="date">最新更新</option>
      <option value="leads">潛客數</option>
      <option value="cpl">CPL 低→高</option>
    </select>
    <span class="count-badge" id="countBadge">— 個案件</span>
  </div>
</div>

<main>
  <!-- 總覽統計 -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="sn" id="totalProjects">—</div><div class="sl">案件總數</div></div>
    <div class="stat-card"><div class="sn" id="totalLeads">—</div><div class="sl">累積潛客</div></div>
    <div class="stat-card"><div class="sn" id="avgCpl">—</div><div class="sl">加權均CPL</div></div>
    <div class="stat-card"><div class="sn" id="activeCount">—</div><div class="sl">進行中案件</div></div>
  </div>

  <div class="section-label" id="gridLabel">所有案件</div>
  <div class="grid" id="projectGrid"></div>
  <div class="empty hidden" id="emptyState">
    <div class="empty-icon">🔍</div>
    <div class="empty-title">找不到符合條件的案件</div>
    <div class="empty-sub">請嘗試其他搜尋條件</div>
  </div>
</main>

<script>
// ── 案件資料庫（往後每新增一案在此加一筆）──
const PROJECTS = [
  {
    id: "富宇玥和",
    name: "富宇玥和",
    city: "台中",
    district: "南區",
    location: "台中南區・中興大學旁・大慶火車站",
    status: "active",
    leads: 178,
    cpl: 374,
    spend: 66516,
    groups: 38,
    startDate: "2026-03-20",
    updated: "2026-05-28",
    tags: ["台中", "南區", "名單"],
    icon: "玥",
    color: "#607d96",
    file: "富宇玥和_受眾分析.html"
  },
  {
    id: "景立方層峰",
    name: "景立方層峰",
    city: "台中",
    district: "北屯",
    location: "台中北屯・南興路×敦富一街・近好市多・漢神洲際・松竹站",
    status: "active",
    leads: 260,
    cpl: 457,
    spend: 118866,
    groups: 65,
    startDate: "2026-03-12",
    updated: "2026-05-28",
    tags: ["台中", "北屯", "名單", "制震宅"],
    icon: "層",
    color: "#4a6e8a",
    file: "景立方層峰_受眾分析.html"
  },
  // ── 範本：複製上面這筆，填入新案件 ──
  // {
  //   id: "案件ID",
  //   name: "案名",
  //   city: "台中",
  //   district: "北屯",
  //   location: "台中北屯・描述",
  //   status: "active",   // or "done"
  //   leads: 0,
  //   cpl: 0,
  //   spend: 0,
  //   groups: 0,
  //   startDate: "2026-01-01",
  //   updated: "2026-01-01",
  //   tags: ["台中", "北屯"],
  //   icon: "字",
  //   color: "#607d96",
  //   file: "FILENAME_受眾分析.html"
  // },
];

let activeRegion = "all";
let activeStatus = "all";

function toggleFilter(btn, type) {
  if (type === 'region') {
    document.querySelectorAll('#regionFilters .filter-btn').forEach(b => b.classList.remove('on'));
    activeRegion = btn.dataset.region;
  } else {
    document.querySelectorAll('#statusFilters .filter-btn').forEach(b => b.classList.remove('on'));
    activeStatus = btn.dataset.status;
  }
  btn.classList.add('on');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;

  let filtered = PROJECTS.filter(p => {
    const matchRegion = activeRegion === 'all' || p.city === activeRegion || p.district.includes(activeRegion);
    const matchStatus = activeStatus === 'all' || p.status === activeStatus;
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.location.toLowerCase().includes(q) || p.tags.some(t => t.includes(q));
    return matchRegion && matchStatus && matchSearch;
  });

  filtered.sort((a,b) => {
    if (sort === 'leads') return b.leads - a.leads;
    if (sort === 'cpl') return a.cpl - b.cpl;
    return b.updated.localeCompare(a.updated);
  });

  renderGrid(filtered);
  updateStats(filtered);
}

function renderGrid(list) {
  const grid = document.getElementById('projectGrid');
  const empty = document.getElementById('emptyState');
  document.getElementById('countBadge').textContent = list.length + ' 個案件';

  if (list.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  grid.innerHTML = list.map(p => `
    <a class="project-card" href="${p.file}" target="_blank">
      <div class="card-head">
        <div class="card-icon" style="background:linear-gradient(135deg,${p.color},${darken(p.color)})">${p.icon}</div>
        <div class="card-meta">
          <div class="card-name">${p.name}</div>
          <div class="card-loc">📍 ${p.location}</div>
        </div>
        <div class="card-status">
          <span class="status-pill ${p.status === 'active' ? 'status-active' : 'status-done'}">
            ${p.status === 'active' ? '進行中' : '已結束'}
          </span>
        </div>
      </div>
      <div class="card-stats">
        <div class="card-stat"><div class="csn">${p.leads}</div><div class="csl">潛客數</div></div>
        <div class="card-stat"><div class="csn">NT$${p.cpl}</div><div class="csl">均CPL</div></div>
        <div class="card-stat"><div class="csn">${p.groups}</div><div class="csl">受眾組數</div></div>
      </div>
      <div class="card-tags">
        <span class="card-tag region">${p.city}${p.district}</span>
        ${p.tags.filter(t => t !== p.city).map(t => `<span class="card-tag">${t}</span>`).join('')}
      </div>
      <div class="card-foot">
        <span class="card-date">更新 ${p.updated} · 開始 ${p.startDate}</span>
        <span class="card-arrow">→</span>
      </div>
    </a>
  `).join('');
}

function updateStats(list) {
  document.getElementById('totalProjects').textContent = list.length;
  const totalLeads = list.reduce((s,p) => s + p.leads, 0);
  document.getElementById('totalLeads').textContent = totalLeads.toLocaleString();
  const totalSpend = list.reduce((s,p) => s + p.spend, 0);
  const weightedCpl = totalLeads > 0 ? Math.round(totalSpend / totalLeads) : 0;
  document.getElementById('avgCpl').textContent = weightedCpl > 0 ? 'NT$' + weightedCpl : '—';
  document.getElementById('activeCount').textContent = list.filter(p => p.status === 'active').length;
}

function darken(hex) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, (n >> 16) - 30);
  const g = Math.max(0, ((n >> 8) & 0xff) - 30);
  const b = Math.max(0, (n & 0xff) - 30);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

// 初始化
applyFilters();
</script>
</body>
</html>
